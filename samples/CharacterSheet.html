<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&family=Pirata+One&display=swap" rel="stylesheet">
    <style id="theme">
      :root {
        --light-rgb: 255,255,255;
        --light: rgb(var(--light-rgb));
        --dark-rgb: 0,0,0;
        --dark: rgb(var(--dark-rgb));
        --accent-rgb: 255,128,0;
        --accent: rgb(var(--accent-rgb));
        --stroke: .015em;
      }
      header,h1,h2,h3,h4,h5,h6 {
        background: var(--dark);
        color: var(--light);
        text-shadow: calc(var(--stroke)*-1) calc(var(--stroke)*-1) 0px var(--accent),
                     calc(var(--stroke)* 1) calc(var(--stroke)*-1) 0px var(--accent),
                     calc(var(--stroke)* 1) calc(var(--stroke)* 1) 0px var(--accent),
                     calc(var(--stroke)*-1) calc(var(--stroke)* 1) 0px var(--accent);
      }
      main, dialog {
        border: .1em solid var(--dark);
        background: var(--light);
        color: var(--dark);
      }
      .backdrop {
        background: rgba(var(--dark-rgb),.5);
      }
      button, button:hover, button:active, button:visited,
      .button, .button:hover, .button:active, .button:visited,
      input[type=button], input[type=button]:hover, input[type=button]:active, input[type=button]:visited,
      input[type=submit], input[type=submit]:hover, input[type=submit]:active, input[type=submit]:visited {
        background: linear-gradient(180deg, var(--light) -25%, var(--accent) 45%, var(--accent) 55%, var(--dark) 150%);
        border: .1em solid var(--dark);
        border-radius: .3em;
        cursor: pointer;
      }
      button:active, .button:active, input[type=button]:active, input[type=submit]:active {
        transform: scale(.95);
      }
    </style>
    <style id="layout">
      :root {
        --scale: 1vmin;
      }
      * { /* normalize */
        box-sizing: border-box;
        padding: 0; margin: 0;
        position: relative;
      }
      html { font-size: calc(var(--scale)*2); }
      html, body {
        left: 0; right: 0;
        top: 0; bottom: 0;
        width: 100%; height: 100%;
      }
      body {
        display: flex;
        overflow: auto;
        overflow-x: hidden;
        position: relative;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
      }
      header {
        width: 100%;
        padding: .5em;
      }
      body > header {
        position: fixed;
        z-index: 1;
      }
      main {
        align-self: center;
        margin-top: 5em;
        padding: 1em;
        border-radius: 1em;
      }
      h1,h2,h3,h4,h5,h6 {
        padding: 0 .5em;
      }
      dialog {
        position: fixed;
        left: 0; right: 0;
        top: 25%; bottom: auto;
        margin: auto; width: 50em;
      }
      .backdrop {
        position: fixed;
        left: 0; right: 0;
        top: 0; bottom: 0;
      }
      input, button, .button, select, textarea {
        vertical-align: middle;
        margin: auto .25em auto 0;
        padding: .2em .4em;
      }
    </style>
    <style id="content">
      body { font-family: 'Economica', sans-serif; }
      header,h1,h2,h3,h4,h5,h6 { font-family: 'Pirata One', cursive; }
      small { font-size: .7em; }
      input, button, select, textarea { font-family: 'Economica', sans-serif; }
      button, .button, input[type=button], input[type=submit] { font-size: .8em; }
    </style>
  </head>
  <body>
    <header>
      <h1>Character Sheet <small>download/upload RPG templates and characters</small></h1>
    </header>
    <main>
      <section bind-hidden="views">
        Something's broken<br />
        Please try again later.
      </section>
      <template bind-template="views.templates">
        <header>
          <h1>Your Templates</h1>
        </header>
        <menu>
          <input type="checkbox" bind-onclick="toggle" />
          <button type="button" bind-onclick="delete" bind-attribute-disabled="disableDelete">Delete</button>
          <button type="button" bind-onclick="create">New</button>
        </menu>
        <menu>
          <template bind-template="templates">
            <li>
              <input type="text" bind-value="name" bind-onchange="rename(value)" />
            </li>
          </template>
        </menu>
      </template>
    </main>
    <template bind-template="views.dialog">
      <dialog bind-open>
        <header bind-textContent="title"></header>
        <p bind-textContent="message"></p>
        <footer>
          <template bind-template="responses">
            <button bind-onclick="submit" bind-textContent="text"></button>
          </template>
        </footer>
      </dialog>
    </template>
    <script>debugger</script>
    <script id="mvw" src="../dst/mvw.extras.js"></script>
    <script id="extensions">
      Object.defineProperty(HTMLDialogElement.prototype, 'open', {
        enumerable: true, configurable: false,
        get: function() { return this.hasAttribute('open'); },
        set: function() { setTimeout(() => this.showModal()); }
      });
      Object.defineProperty(HTMLInputElement.prototype, 'autosize', {
        enumerable: true, configurable: false,
        get: function() { return this.hasAttribute('autosize'); },
        set: function(value) {
          this.attribute.autosize = true;
        }
      })
    </script>
    <script id="application">
      class Application {
        static #CacheKey = 'CharacterSheet';
        #refresh;
        views = {
          templates: null,
          instances: null,
          dialog: null
        };
        constructor(subscription) {
          this.#refresh = subscription;
          this.load();
        }
        load() {
          this.model = Object.deserialize(
            localStorage.getItem(Application.#CacheKey)
            || Object.serialize({
              templates: []
            }), {
              parseType: (value) => {
                if (!/^[0-9a-z@$#\.]+$/i.test(value)) { return {}; }
                try { return new (eval(value))(this); }
                catch { return {}; }
              }
            }
          );
        }
        save() {
          localStorage.setItem(Application.#CacheKey, Object.serialize(this.model));
          this.#refresh();
        }
        showTemplates() {
          this.views.instances = null;
          this.views.templates = new Templates(this);
          this.#refresh();
        }
        showInstances() {
          this.views.templates = null;
          this.views.instances = new Instances(this);
          this.#refresh();
        }
        showDialog(dialog) {
          this.views.dialog = dialog;
          this.#refresh();
          return dialog.promise.then(value => {
            this.views.dialog = null;
            this.#refresh();
            return value;
          });
        }
      }
    </script>
    <script id="views">
      class Dialog {
        title = '';
        message = '';
        buttons = ['ok'];
        constructor(overrides) {
          Object.override(this, overrides);
          var conclude;
          this.promise = new Promise(resolve => conclude = resolve);
          this.responses = this.buttons.map(
            text => new Dialog.Button(text, t => conclude(t))
          )
        }
        static Button = class Button {
          text;
          submit;
          constructor(text, continuation) {
            this.text = text;
            this.submit = () => continuation(text);
          }
        }
      }

      class Templates {
        #application;
        get templates() { return this.#application.model.templates; }
        get disableDelete() {
          return !this.templates.some(t => t.selected)
              && !this.templates.flatMap(t => t.instances).some(i => i.selected);
        }
        constructor(application) {
          this.#application = application;
        }
        toggle() {
          var selected = this.templates.filter(t => t.selected);
          var newState = selected.length >= this.templates.length;
          this.templates.forEach(t => t.selected = true);
          this.#application.save();
        }
        create() {
          this.templates.push(new Template(this.#application));
          this.#application.save();
        }
        delete() {
          this.#application.showDialog(new Dialog({
            title: 'Delete Template(s)',
            message: "This can't be undone. Are you sure?",
            buttons: ['delete', 'cancel']
          }))
          .then(selection => {
            if (selection !== 'delete') { return; }
            var selected = this.templates.filter(t => t.selected);
            selected.forEach(t => this.templates.splice(this.templates.indexOf(t), 1));
            this.#application.save();
          });
        }
      }

      class Template {
        #application;
        selected = false;
        name = 'New Template';
        instances = [];
        layout = [];
        constructor(application) {
          this.#application = application;
        }
        rename(name) {
          this.name = name;
          this.#application.save();
        }
      }

      class Instance {
        selected = false;
        template = null;
        values = {};
      }
    </script>
    <script id="bootstrap">
      let application = new Application(() => document.map(application, {attributePrefix:"bind-"}));
      application.showTemplates();
    </script>
